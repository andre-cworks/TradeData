<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Trade Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      z-index: 10;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #58a6ff;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.8rem;
      color: #8b949e;
    }

    .controls select, .controls input[type=range] {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .controls select:focus { outline: none; border-color: #58a6ff; }

    .legend-label {
      font-size: 0.75rem;
      color: #8b949e;
    }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg#map {
      width: 100%;
      height: 100%;
    }

    .country {
      stroke: #30363d;
      stroke-width: 0.5px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .country:hover { opacity: 0.8; stroke: #58a6ff; stroke-width: 1.2px; }
    .country.selected { stroke: #f0f6fc; stroke-width: 1.5px; }

    .graticule { fill: none; stroke: #1c2128; stroke-width: 0.4px; }
    .sphere { fill: #0d1b2a; }

    /* Sidebar */
    #sidebar {
      width: 300px;
      background: #161b22;
      border-left: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #30363d;
      background: #1c2128;
    }

    #sidebar-header h2 {
      font-size: 0.95rem;
      font-weight: 600;
    }

    #sidebar-header p {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 2px;
    }

    #sidebar-content {
      padding: 14px 16px;
      overflow-y: auto;
      flex: 1;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.82rem;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #8b949e; }
    .stat-value { font-weight: 600; color: #e6edf3; text-align: right; }
    .stat-value.positive { color: #3fb950; }
    .stat-value.negative { color: #f85149; }

    .partner-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.8rem;
      border-bottom: 1px solid #21262d;
    }

    .partner-item:last-child { border-bottom: none; }

    .partner-bar-wrap {
      flex: 1;
      background: #21262d;
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
    }

    .partner-bar {
      height: 100%;
      border-radius: 3px;
    }

    .partner-name { width: 90px; color: #8b949e; }
    .partner-value { width: 60px; text-align: right; color: #e6edf3; }

    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #58a6ff;
      margin: 14px 0 6px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 220px;
      z-index: 100;
      line-height: 1.6;
    }

    #tooltip strong { display: block; font-size: 0.9rem; color: #58a6ff; margin-bottom: 4px; }
    #tooltip .tip-row { display: flex; justify-content: space-between; gap: 12px; }
    #tooltip .tip-label { color: #8b949e; }
    #tooltip .tip-val { color: #e6edf3; font-weight: 600; }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.75rem;
    }

    #legend h4 { color: #8b949e; margin-bottom: 6px; font-weight: 500; }

    .legend-gradient {
      width: 160px;
      height: 10px;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .legend-ticks {
      display: flex;
      justify-content: space-between;
      color: #8b949e;
    }

    /* Zoom controls */
    #zoom-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .zoom-btn {
      width: 30px;
      height: 30px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .zoom-btn:hover { background: #21262d; }

    #no-data {
      color: #8b949e;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <h1>🌍 World Trade Map</h1>
  <div class="controls">
    <label>Metric:
      <select id="metric-select">
        <option value="total">Total Trade (Exports + Imports)</option>
        <option value="exports">Exports</option>
        <option value="imports">Imports</option>
        <option value="balance" selected>Trade Balance</option>
      </select>
    </label>
    <label>Year:
      <select id="year-select">
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
        <option value="2020">2020</option>
        <option value="2019">2019</option>
      </select>
    </label>
  </div>
</header>

<div id="main">
  <div id="map-container">
    <svg id="map"></svg>
    <div id="zoom-controls">
      <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
      <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
      <button class="zoom-btn" id="zoom-reset" title="Reset" style="font-size:0.65rem;">⌂</button>
    </div>
    <div id="legend">
      <h4 id="legend-title">Total Trade (USD)</h4>
      <canvas class="legend-gradient" id="legend-canvas"></canvas>
      <div class="legend-ticks" id="legend-ticks"></div>
    </div>
    <div id="tooltip"></div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <h2 id="country-name">Click a country</h2>
      <p id="country-sub">to view trade details</p>
    </div>
    <div id="sidebar-content">
      <div id="no-data">Select a country on the map to explore its trade statistics and top trading partners.</div>
      <div id="country-stats" style="display:none"></div>
    </div>
  </div>
</div>

function getISO(name) {
  if (aliases[name]) return aliases[name];
  return nameToISO[name] || null;
}

// ─── Color scales ─────────────────────────────────────────────────────────────
function buildColorScale(metric, data) {
  const vals = Object.values(data).map(d => metricValue(d, metric)).filter(v => v !== null);
  if (metric === "balance") {
    const ext = d3.max(vals.map(Math.abs));
    return d3.scaleDiverging([-ext, 0, ext], d3.interpolateRdYlGn);
  }
  const [lo, hi] = d3.extent(vals);
  return d3.scaleSequential([lo, hi], d3.interpolateYlOrRd);
}

function metricValue(d, metric) {
  if (!d) return null;
  if (metric === "total")   return d.exports + d.imports;
  if (metric === "exports") return d.exports;
  if (metric === "imports") return d.imports;
  if (metric === "balance") return d.exports - d.imports;
  return null;
}

// ─── Legend ───────────────────────────────────────────────────────────────────
function drawLegend(scale, metric) {
  const canvas = document.getElementById("legend-canvas");
  const ctx = canvas.getContext("2d");
  const w = canvas.width = 160, h = canvas.height = 10;
  for (let i = 0; i < w; i++) {
    ctx.fillStyle = scale(scale.domain()[0] + (scale.domain()[scale.domain().length-1] - scale.domain()[0]) * i / w);
    ctx.fillRect(i, 0, 1, h);
  }
  const dom = scale.domain();
  const lo = dom[0], hi = dom[dom.length-1];
  document.getElementById("legend-ticks").innerHTML =
    `<span>${fmt(lo)}</span><span>${fmt((lo+hi)/2)}</span><span>${fmt(hi)}</span>`;
  document.getElementById("legend-title").textContent =
    { total:"Total Trade", exports:"Exports", imports:"Imports", balance:"Trade Balance" }[metric] + " (USD)";
}

function fmt(v) {
  if (Math.abs(v) >= 1000) return (v/1000).toFixed(1) + "T";
  if (Math.abs(v) >= 1)    return v.toFixed(0) + "B";
  return v.toFixed(1) + "B";
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function showCountry(iso, metric) {
  const year = document.getElementById("year-select").value;
  const d = tradeData[year][iso];
  document.getElementById("country-name").textContent = isoNames[iso] || iso;
  document.getElementById("country-sub").textContent = "Trade data for " + year;
  document.getElementById("no-data").style.display = "none";
  const stats = document.getElementById("country-stats");
  stats.style.display = "block";

  if (!d) {
    stats.innerHTML = `<div class="section-title">Statistics</div>
      <p style="color:#8b949e;font-size:0.8rem;margin-top:8px">No data available for this country.</p>`;
    return;
  }

  const balance = d.exports - d.imports;
  const balClass = balance >= 0 ? "positive" : "negative";
  const balSign  = balance >= 0 ? "+" : "";

  // Top partners
  const expPartners = d.partners.exports.slice(0, 5);
  const impPartners = d.partners.imports.slice(0, 5);

  function partnerBars(list, color) {
    return list.map((p, i) => {
      const pct = Math.round(100 - i * 15);
      return `<div class="partner-item">
        <span class="partner-name">${p}</span>
        <div class="partner-bar-wrap"><div class="partner-bar" style="width:${pct}%;background:${color}"></div></div>
        <span class="partner-value">~${pct}%</span>
      </div>`;
    }).join("");
  }

  const gd = goodsData[iso];
  const maxGoodsVal = gd
    ? Math.max(...gd.exports.map(g => g.v), ...gd.imports.map(g => g.v))
    : 1;

  function goodsBars(list, color) {
    return list.map(g => {
      const pct = Math.round((g.v / maxGoodsVal) * 100);
      return `<div class="partner-item">
        <span class="partner-name" style="width:110px;font-size:0.75rem">${g.n}</span>
        <div class="partner-bar-wrap"><div class="partner-bar" style="width:${pct}%;background:${color}"></div></div>
        <span class="partner-value">$${fmt(g.v)}</span>
      </div>`;
    }).join("");
  }

  stats.innerHTML = `
    <div class="section-title">Key Figures</div>
    <div class="stat-row"><span class="stat-label">Exports</span><span class="stat-value">$${fmt(d.exports)}</span></div>
    <div class="stat-row"><span class="stat-label">Imports</span><span class="stat-value">$${fmt(d.imports)}</span></div>
    <div class="stat-row"><span class="stat-label">Total Trade</span><span class="stat-value">$${fmt(d.exports+d.imports)}</span></div>
    <div class="stat-row"><span class="stat-label">Trade Balance</span><span class="stat-value ${balClass}">${balSign}$${fmt(balance)}</span></div>

    ${gd ? `
    <div class="section-title" style="margin-top:18px">Top Export Goods</div>
    ${goodsBars(gd.exports, "#3fb950")}

    <div class="section-title" style="margin-top:18px">Top Import Goods</div>
    ${goodsBars(gd.imports, "#58a6ff")}
    ` : ''}

    <div class="section-title" style="margin-top:18px">Top Export Partners</div>
    ${partnerBars(expPartners, "#6e7681")}

    <div class="section-title" style="margin-top:18px">Top Import Partners</div>
    ${partnerBars(impPartners, "#6e7681")}
  `;
}

// ─── Map rendering ────────────────────────────────────────────────────────────
function resize() {
  const container = document.getElementById("map-container");
  width  = container.clientWidth;
  height = container.clientHeight;
  svg.attr("viewBox", `0 0 ${width} ${height}`);
  projection = d3.geoNaturalEarth1()
    .scale(width / 6.28)
    .translate([width / 2, height / 2]);
  path = d3.geoPath().projection(projection);
}

function getMetricAndYear() {
  return {
    metric: document.getElementById("metric-select").value,
    year:   document.getElementById("year-select").value
  };
}

function updateColors() {
  if (!_countries) return; // map not loaded yet
  const { metric, year } = getMetricAndYear();
  const data = tradeData[year];
  colorScale = buildColorScale(metric, data);
  drawLegend(colorScale, metric);

  g.selectAll(".country").attr("fill", function() {
    const iso = d3.select(this).attr("data-iso");
    const d   = data[iso];
    const val = metricValue(d, metric);
    return val !== null ? colorScale(val) : "#2d333b";
  });
}

// ─── Load world topology ──────────────────────────────────────────────────────
let _countries, _borders, _idToName;

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(world => {
    resize();

    _countries = topojson.feature(world, world.objects.countries);
    _borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
    _idToName  = getIdToName();

    // Set up zoom
    zoom = d3.zoom()
      .scaleExtent([0.8, 12])
      .on("zoom", ({ transform }) => g.attr("transform", transform));
    svg.call(zoom);

    // Build colorScale before drawMap so it can be used immediately
    const { metric, year } = getMetricAndYear();
    colorScale = buildColorScale(metric, tradeData[year]);
    drawLegend(colorScale, metric);

    drawMap(_countries, _borders, _idToName);

    window.addEventListener("resize", () => {
      resize();
      colorScale = buildColorScale(getMetricAndYear().metric, tradeData[getMetricAndYear().year]);
      drawMap(_countries, _borders, _idToName);
    });

    document.getElementById("zoom-in").onclick  = () => svg.transition().call(zoom.scaleBy, 1.5);
    document.getElementById("zoom-out").onclick = () => svg.transition().call(zoom.scaleBy, 0.67);
    document.getElementById("zoom-reset").onclick = () =>
      svg.transition().call(zoom.transform, d3.zoomIdentity);
  });

function drawMap(countries, borders, idToName) {
  g.selectAll("*").remove();

  g.append("path").datum({type:"Sphere"})
    .attr("class","sphere").attr("d", path);

  g.append("path").datum(d3.geoGraticule()())
    .attr("class","graticule").attr("d", path);

  const { metric, year } = getMetricAndYear();
  const data = tradeData[year];

  g.selectAll(".country")
    .data(countries.features)
    .join("path")
    .attr("class","country")
    .attr("d", path)
    .attr("data-iso", d => {
      const name = idToName[+d.id] || "";
      return getISO(name) || "";
    })
    .attr("fill", d => {
      const name = idToName[+d.id] || "";
      const iso  = getISO(name);
      const val  = iso ? metricValue(data[iso], metric) : null;
      return val !== null ? colorScale(val) : "#2d333b";
    })
    .on("mousemove", function(event, d) {
      const name = idToName[+d.id] || "Unknown";
      const iso  = getISO(name);
      const cdata = iso ? data[iso] : null;
      const { metric } = getMetricAndYear();
      const val = cdata ? metricValue(cdata, metric) : null;

      let tipContent = `<strong>${name}</strong>`;
      if (cdata) {
        const metricLabels = { total:"Total Trade", exports:"Exports", imports:"Imports", balance:"Balance" };
        tipContent += `<div class="tip-row"><span class="tip-label">${metricLabels[metric]}</span><span class="tip-val">$${fmt(val)}</span></div>`;
        tipContent += `<div class="tip-row"><span class="tip-label">Exports</span><span class="tip-val">$${fmt(cdata.exports)}</span></div>`;
        tipContent += `<div class="tip-row"><span class="tip-label">Imports</span><span class="tip-val">$${fmt(cdata.imports)}</span></div>`;
      } else {
        tipContent += `<div style="color:#8b949e;margin-top:4px">No data available</div>`;
      }
      tooltip.innerHTML = tipContent;

      const rect = document.getElementById("map-container").getBoundingClientRect();
      let tx = event.clientX - rect.left + 14;
      let ty = event.clientY - rect.top  - 10;
      if (tx + 230 > rect.width)  tx = event.clientX - rect.left - 230;
      if (ty + 120 > rect.height) ty = event.clientY - rect.top  - 120;
      tooltip.style.left    = tx + "px";
      tooltip.style.top     = ty + "px";
      tooltip.style.opacity = "1";
    })
    .on("mouseleave", () => { tooltip.style.opacity = "0"; })
    .on("click", function(event, d) {
      const name = idToName[+d.id] || "";
      const iso  = getISO(name);
      if (!iso) return;

      g.selectAll(".country").classed("selected", false);
      d3.select(this).classed("selected", true);
      selectedISO = iso;
      const { metric } = getMetricAndYear();
      showCountry(iso, metric);
    });

  g.append("path")
    .datum(borders)
    .attr("fill","none")
    .attr("stroke","#1c2128")
    .attr("stroke-width","0.5px")
    .attr("d", path);
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById("metric-select").addEventListener("change", () => {
  updateColors();
  if (selectedISO) showCountry(selectedISO, getMetricAndYear().metric);
});

document.getElementById("year-select").addEventListener("change", () => {
  updateColors();
  if (selectedISO) showCountry(selectedISO, getMetricAndYear().metric);
});
